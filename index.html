<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tyler Walters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #140030;
      font-family: 'Inter', sans-serif;
      /* Minimum height: preserves enough image to be meaningful */
      min-height: 320px;
    }

    /* ============================================================
       LAYOUT STRUCTURE
       Two rows:
         1. Title band  — fixed height, ground color
         2. Canvas area — remaining height, image fills it
    ============================================================ */

    /* The title band height — adjust this value to taste */
    :root {
      --band-height: clamp(52px, 8vh, 80px);
      --ground:      #140030;
      --text:        #F0F0F8;
      --accent:      #4A90D9;
    }

    /* ============================================================
       TITLE BAND — solid ground color, full width
    ============================================================ */
    #title-band {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--band-height);
      background: var(--ground);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #title-band h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 100;
      font-style: italic;
      font-size: clamp(1.4rem, 3.2vw, 3.2rem);
      letter-spacing: 0.28em;
      color: var(--text);
      line-height: 1;
      text-transform: none;
      user-select: none;
    }

    /* ============================================================
       CANVAS — fills everything below the title band
       Never moves. Image covers this area.
    ============================================================ */
    #seq-canvas {
      position: fixed;
      top: var(--band-height);
      left: 0;
      width: 100vw;
      /* Height = viewport minus the title band */
      height: calc(100vh - var(--band-height));
      display: block;
      /* Enforce minimum aspect ratio: if window is too short,
         canvas maintains 16:9 minimum and overflows (hidden by body) */
      min-height: calc((100vw) * 9 / 16);
    }

    /* ============================================================
       SUBTLE BOTTOM VIGNETTE
       Just slightly darkens bottom edge so ENTER is legible
    ============================================================ */
    #vignette {
      position: fixed;
      top: var(--band-height);
      left: 0;
      width: 100vw;
      height: calc(100vh - var(--band-height));
      pointer-events: none;
      z-index: 3;
      background: linear-gradient(
        to bottom,
        rgba(20, 0, 48, 0.0)  0%,
        rgba(20, 0, 48, 0.0)  70%,
        rgba(20, 0, 48, 0.65) 100%
      );
    }

    /* ============================================================
       BOTTOM-LEFT CLUSTER
       Contains: two scroll arrows + ENTER button
       Sits in the consistently dark bottom area
    ============================================================ */
    #bottom-left {
      position: fixed;
      bottom: 4vh;
      left: 4vw;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.6rem;
    }

    /* Scroll arrows — two chevrons stacked, prompt the visitor to scroll */
    #scroll-arrows {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      opacity: 0.28;   /* starts faint, brightens slightly on scroll */
      transition: opacity 0.5s ease;
      pointer-events: none;
      margin-left: 0.4rem;  /* align roughly with ENTER text */
    }

    #scroll-arrows svg {
      width: 14px;
      height: 10px;
      fill: none;
      stroke: var(--text);
      stroke-width: 1.5;
      animation: arrowBob 1.8s ease-in-out infinite;
    }

    #scroll-arrows svg:nth-child(2) {
      animation-delay: 0.2s;
      opacity: 0.6;
    }

    @keyframes arrowBob {
      0%, 100% { transform: translateY(0);   }
      50%       { transform: translateY(3px); }
    }

    /* ENTER button — horizontal, bottom left */
    #enter-btn {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.6rem, 0.85vw, 0.78rem);
      font-weight: 300;
      letter-spacing: 0.52em;
      text-transform: uppercase;
      writing-mode: horizontal-tb;   /* normal horizontal text */
      text-orientation: mixed;
      color: var(--text);
      text-decoration: none;
      background: transparent;
      border: 1px solid rgba(240, 240, 248, 0.28);
      padding: 0.65em 2em;
      /* Slightly more visible at start than before */
      opacity: 0.28;
      transition: opacity 0.5s ease, border-color 0.4s ease,
                  color 0.4s ease, font-size 0.3s ease;
    }

    #enter-btn:hover {
      opacity: 1 !important;
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ============================================================
       PROGRESS LINE — thin accent line growing up left edge
    ============================================================ */
    #progress-line {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 2px;
      height: 0%;
      background: var(--accent);
      opacity: 0.4;
      z-index: 10;
      transition: height 0.08s linear;
    }

  </style>
</head>
<body>

  <!-- Canvas fills the area below the title band -->
  <canvas id="seq-canvas"></canvas>

  <!-- Bottom vignette for legibility -->
  <div id="vignette" aria-hidden="true"></div>

  <!-- Progress line -->
  <div id="progress-line" aria-hidden="true"></div>

  <!-- Title band -->
  <div id="title-band">
    <h1>Tyler Walters</h1>
  </div>

  <!-- Bottom-left cluster: scroll arrows + ENTER -->
  <div id="bottom-left">
    <div id="scroll-arrows" aria-hidden="true">
      <!-- Two chevrons suggest "scroll down" -->
      <svg viewBox="0 0 20 12" xmlns="http://www.w3.org/2000/svg">
        <polyline points="2 2 10 10 18 2"/>
      </svg>
      <svg viewBox="0 0 20 12" xmlns="http://www.w3.org/2000/svg">
        <polyline points="2 2 10 10 18 2"/>
      </svg>
    </div>
    <a href="about.html" id="enter-btn" aria-label="Enter site">Enter</a>
  </div>


<script>
(function () {
  'use strict';

  /* ----------------------------------------------------------
     CONFIGURATION
  ---------------------------------------------------------- */
  const FRAME_COUNT  = 120;
  const FRAME_PATH   = 'assets/skyty-frames/frame';
  const FRAME_EXT    = '.jpg';
  const REVEAL_START = 0.45;   /* progress at which ENTER/arrows begin brightening */
  const REVEAL_FULL  = 0.88;
  const SENSITIVITY  = 0.0007;

  /* ----------------------------------------------------------
     ELEMENTS
  ---------------------------------------------------------- */
  const canvas      = document.getElementById('seq-canvas');
  const ctx         = canvas.getContext('2d');
  const enterBtn    = document.getElementById('enter-btn');
  const arrows      = document.getElementById('scroll-arrows');
  const progressBar = document.getElementById('progress-line');

  /* ----------------------------------------------------------
     STATE
  ---------------------------------------------------------- */
  const frames     = new Array(FRAME_COUNT).fill(null);
  let loadedCount  = 0;
  let currentFrame = 0;
  let targetFrame  = 0;
  let progress     = 0;
  let firstLoaded  = false;

  /* ----------------------------------------------------------
     CANVAS SIZE
     Matches the area below the title band.
  ---------------------------------------------------------- */
  function getCanvasArea () {
    const bandHeight = parseInt(
      getComputedStyle(document.documentElement)
        .getPropertyValue('--band-height')
    ) || 64;
    return {
      w: window.innerWidth,
      h: Math.max(window.innerHeight - canvas.offsetTop, 200)
    };
  }

  function resizeCanvas () {
    const { w, h } = getCanvasArea();
    canvas.width  = w;
    canvas.height = h;
    drawFrame(currentFrame);
  }

  window.addEventListener('resize', resizeCanvas, { passive: true });

  /* Wait for DOM to settle before first resize */
  requestAnimationFrame(resizeCanvas);

  /* ----------------------------------------------------------
     DRAW — cover scaling
  ---------------------------------------------------------- */
  function drawFrame (index) {
    const img = frames[index];
    if (!img || !img.naturalWidth) return;

    const cw = canvas.width;
    const ch = canvas.height;
    const iw = img.naturalWidth;
    const ih = img.naturalHeight;

    const scale = Math.max(cw / iw, ch / ih);
    const sw = iw * scale;
    const sh = ih * scale;
    const sx = (cw - sw) / 2;
    const sy = (ch - sh) / 2;

    ctx.clearRect(0, 0, cw, ch);
    ctx.drawImage(img, sx, sy, sw, sh);
  }

  /* ----------------------------------------------------------
     PRELOAD
  ---------------------------------------------------------- */
  for (let i = 0; i < FRAME_COUNT; i++) {
    const img = new Image();
    const idx = i;
    img.onload = function () {
      frames[idx] = img;
      loadedCount++;
      if (!firstLoaded && idx === 0) {
        firstLoaded = true;
        resizeCanvas();
        drawFrame(0);
      }
    };
    img.onerror = function () { loadedCount++; };
    img.src = FRAME_PATH + String(i + 1).padStart(3, '0') + FRAME_EXT;
  }

  /* ----------------------------------------------------------
     UI UPDATE
  ---------------------------------------------------------- */
  function updateUI () {
    progressBar.style.height = (progress * 100) + '%';

    if (progress >= REVEAL_START) {
      const t  = Math.min((progress - REVEAL_START) / (REVEAL_FULL - REVEAL_START), 1);
      const op = Math.max(0.28, t);
      enterBtn.style.opacity = String(op);
      /* Arrows brighten early to prompt interaction, then fade slightly */
      arrows.style.opacity = String(Math.min(0.28 + t * 0.5, 0.75));
      /* Slightly larger ENTER as it reaches full visibility */
      if (t > 0.85) {
        enterBtn.style.fontSize = 'clamp(0.62rem, 0.9vw, 0.82rem)';
      }
    } else {
      enterBtn.style.opacity = '0.28';
      /* Arrows pulse gently at start to hint at interaction */
      arrows.style.opacity = String(0.28 + Math.sin(Date.now() / 800) * 0.08);
    }
  }

  /* ----------------------------------------------------------
     ANIMATION LOOP
  ---------------------------------------------------------- */
  function animate () {
    if (targetFrame !== currentFrame) {
      currentFrame += targetFrame > currentFrame ? 1 : -1;
      drawFrame(currentFrame);
    }
    updateUI();
    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);

  /* ----------------------------------------------------------
     INPUT
  ---------------------------------------------------------- */
  function advanceByDelta (delta) {
    progress    = Math.min(Math.max(progress + delta * SENSITIVITY, 0), 1);
    targetFrame = Math.round(progress * (FRAME_COUNT - 1));
  }

  window.addEventListener('wheel', function (e) {
    e.preventDefault();
    advanceByDelta(e.deltaY);
  }, { passive: false });

  let touchStartY = null;
  window.addEventListener('touchstart', function (e) {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  window.addEventListener('touchmove', function (e) {
    if (touchStartY === null) return;
    const dy    = touchStartY - e.touches[0].clientY;
    touchStartY = e.touches[0].clientY;
    advanceByDelta(dy * 2.5);
  }, { passive: true });

  window.addEventListener('touchend', function () {
    touchStartY = null;
  }, { passive: true });

  window.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowDown' || e.key === 'PageDown') {
      e.preventDefault(); advanceByDelta(80);
    } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault(); advanceByDelta(-80);
    } else if ((e.key === 'Enter' || e.key === ' ') && progress >= REVEAL_START) {
      window.location.href = 'about.html';
    }
  });

  /* ----------------------------------------------------------
     PLACEHOLDER
  ---------------------------------------------------------- */
  setTimeout(function () {
    if (!firstLoaded) {
      const g = ctx.createRadialGradient(
        canvas.width * 0.5, canvas.height * 0.45, 0,
        canvas.width * 0.5, canvas.height * 0.45, canvas.width * 0.5
      );
      g.addColorStop(0,   'rgba(74,144,217,0.18)');
      g.addColorStop(0.6, 'rgba(74,40,160,0.1)');
      g.addColorStop(1,   'rgba(20,0,48,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }, 3000);

})();
</script>

</body>
</html>
