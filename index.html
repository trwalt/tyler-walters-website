<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tyler Walters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <style>

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;   /* NO page scroll — sequence driven by wheel/touch */
      background: #140030;
      font-family: 'Inter', sans-serif;
    }

    /* ============================================================
       FULL-SCREEN FIXED CANVAS
       Image fills the entire viewport and never moves
    ============================================================ */
    #seq-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    /* ============================================================
       DARK VIGNETTE
       Dark strip at top for title legibility,
       subtle darkening at bottom edges
    ============================================================ */
    #vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 2;
      background:
        linear-gradient(to bottom,
          rgba(20, 0, 48, 0.80) 0%,
          rgba(20, 0, 48, 0.0) 20%,
          rgba(20, 0, 48, 0.0) 78%,
          rgba(20, 0, 48, 0.50) 100%
        );
    }

    /* ============================================================
       TITLE — sits in the dark strip at the top
    ============================================================ */
    #title {
      position: fixed;
      top: 5vh;
      left: 0;
      right: 0;
      z-index: 10;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    #title h1 {
      font-family: 'Inter', sans-serif;
      font-size: clamp(2rem, 4.5vw, 4.4rem);
      font-weight: 200;
      letter-spacing: 0.32em;
      text-transform: none;   /* "Tyler Walters" — no forced caps */
      color: #F0F0F8;
      line-height: 1;
    }

    /* ============================================================
       ENTER BUTTON
       Right side, vertically centred — away from figure
    ============================================================ */
    #enter-btn {
      position: fixed;
      right: 4vw;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;

      font-family: 'Inter', sans-serif;
      font-size: clamp(0.58rem, 0.9vw, 0.78rem);
      font-weight: 300;
      letter-spacing: 0.48em;
      text-transform: uppercase;
      color: #F0F0F8;
      text-decoration: none;

      background: transparent;
      border: 1px solid rgba(240, 240, 248, 0.28);
      padding: 0.8em 1.6em;

      opacity: 0.18;
      transition: opacity 0.5s ease, border-color 0.4s ease,
                  color 0.4s ease, transform 0.4s ease;
      display: inline-block;
      writing-mode: vertical-rl;   /* vertical text suits the side placement */
      text-orientation: mixed;
    }

    #enter-btn:hover {
      opacity: 1 !important;
      border-color: #4A90D9;
      color: #4A90D9;
    }

    /* ============================================================
       SCROLL HINT — chevron below title, fades on first scroll
    ============================================================ */
    #scroll-hint {
      position: fixed;
      top: calc(5vh + clamp(2rem, 4.5vw, 4.4rem) + 1.8rem);
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
      opacity: 0.28;
      transition: opacity 0.6s ease;
      animation: hintBob 2.2s ease-in-out infinite;
    }

    #scroll-hint svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: #F0F0F8;
      stroke-width: 1.5;
    }

    @keyframes hintBob {
      0%, 100% { transform: translateY(0);   }
      50%       { transform: translateY(5px); }
    }

    /* ============================================================
       PROGRESS LINE — thin blue line growing up left edge
    ============================================================ */
    #progress-line {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 2px;
      height: 0%;
      background: #4A90D9;
      opacity: 0.45;
      z-index: 10;
      transition: height 0.08s linear;
    }

  </style>
</head>
<body>

  <canvas id="seq-canvas"></canvas>
  <div id="vignette" aria-hidden="true"></div>
  <div id="progress-line" aria-hidden="true"></div>

  <div id="title">
    <h1>Tyler Walters</h1>
  </div>

  <div id="scroll-hint" aria-hidden="true">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </div>

  <a href="about.html" id="enter-btn" aria-label="Enter site">Enter</a>


<script>
(function () {
  'use strict';

  /* ----------------------------------------------------------
     CONFIGURATION
  ---------------------------------------------------------- */
  const FRAME_COUNT  = 120;
  const FRAME_PATH   = 'assets/skyty-frames/frame';
  const FRAME_EXT    = '.jpg';
  const REVEAL_START = 0.5;    /* progress at which ENTER starts appearing */
  const REVEAL_FULL  = 0.88;   /* progress at which ENTER is fully visible */
  const SENSITIVITY  = 0.0007; /* scroll speed: lower = slower sequence */

  /* ----------------------------------------------------------
     ELEMENTS
  ---------------------------------------------------------- */
  const canvas      = document.getElementById('seq-canvas');
  const ctx         = canvas.getContext('2d');
  const enterBtn    = document.getElementById('enter-btn');
  const scrollHint  = document.getElementById('scroll-hint');
  const progressBar = document.getElementById('progress-line');

  /* ----------------------------------------------------------
     STATE
  ---------------------------------------------------------- */
  const frames     = new Array(FRAME_COUNT).fill(null);
  let loadedCount  = 0;
  let currentFrame = 0;
  let targetFrame  = 0;
  let progress     = 0;
  let firstLoaded  = false;

  /* ----------------------------------------------------------
     CANVAS RESIZE
  ---------------------------------------------------------- */
  function resizeCanvas () {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    drawFrame(currentFrame);
  }

  window.addEventListener('resize', resizeCanvas, { passive: true });
  resizeCanvas();

  /* ----------------------------------------------------------
     DRAW FRAME — cover scaling (like object-fit: cover)
  ---------------------------------------------------------- */
  function drawFrame (index) {
    const img = frames[index];
    if (!img) return;

    const cw = canvas.width;
    const ch = canvas.height;
    const iw = img.naturalWidth;
    const ih = img.naturalHeight;
    if (!iw || !ih) return;

    const scale = Math.max(cw / iw, ch / ih);
    const sw = iw * scale;
    const sh = ih * scale;
    const sx = (cw - sw) / 2;
    const sy = (ch - sh) / 2;

    ctx.clearRect(0, 0, cw, ch);
    ctx.drawImage(img, sx, sy, sw, sh);
  }

  /* ----------------------------------------------------------
     PRELOAD
  ---------------------------------------------------------- */
  for (let i = 0; i < FRAME_COUNT; i++) {
    const img = new Image();
    const idx = i;
    img.onload = function () {
      frames[idx] = img;
      loadedCount++;
      if (!firstLoaded && idx === 0) {
        firstLoaded = true;
        drawFrame(0);
      }
    };
    img.onerror = function () { loadedCount++; };
    img.src = FRAME_PATH + String(i + 1).padStart(3, '0') + FRAME_EXT;
  }

  /* ----------------------------------------------------------
     UI UPDATE
  ---------------------------------------------------------- */
  function updateUI () {
    /* Progress line grows upward from bottom-left */
    progressBar.style.height = (progress * 100) + '%';

    /* Scroll hint fades once interaction begins */
    scrollHint.style.opacity = progress < 0.04 ? '0.28' : '0';

    /* ENTER reveal */
    if (progress >= REVEAL_START) {
      const t      = Math.min((progress - REVEAL_START) / (REVEAL_FULL - REVEAL_START), 1);
      const op     = Math.max(0.18, t);
      const scale  = 1 + t * 0.06;
      enterBtn.style.opacity   = String(op);
      enterBtn.style.transform = 'translateY(-50%) scale(' + scale + ')';
    } else {
      enterBtn.style.opacity   = '0.18';
      enterBtn.style.transform = 'translateY(-50%) scale(1)';
    }
  }

  /* ----------------------------------------------------------
     ANIMATION LOOP
  ---------------------------------------------------------- */
  function animate () {
    if (targetFrame !== currentFrame) {
      currentFrame += targetFrame > currentFrame ? 1 : -1;
      drawFrame(currentFrame);
    }
    updateUI();
    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);

  /* ----------------------------------------------------------
     INPUT — wheel, touch, keyboard
  ---------------------------------------------------------- */
  function advanceByDelta (delta) {
    progress    = Math.min(Math.max(progress + delta * SENSITIVITY, 0), 1);
    targetFrame = Math.round(progress * (FRAME_COUNT - 1));
  }

  window.addEventListener('wheel', function (e) {
    e.preventDefault();
    advanceByDelta(e.deltaY);
  }, { passive: false });

  let touchStartY = null;
  window.addEventListener('touchstart', function (e) {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  window.addEventListener('touchmove', function (e) {
    if (touchStartY === null) return;
    const dy    = touchStartY - e.touches[0].clientY;
    touchStartY = e.touches[0].clientY;
    advanceByDelta(dy * 2.5);
  }, { passive: true });

  window.addEventListener('touchend', function () {
    touchStartY = null;
  }, { passive: true });

  window.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowDown' || e.key === 'PageDown') {
      e.preventDefault(); advanceByDelta(80);
    } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault(); advanceByDelta(-80);
    } else if ((e.key === 'Enter' || e.key === ' ') && progress >= REVEAL_START) {
      window.location.href = 'about.html';
    }
  });

  /* ----------------------------------------------------------
     PLACEHOLDER if frames fail to load
  ---------------------------------------------------------- */
  setTimeout(function () {
    if (!firstLoaded) {
      const g = ctx.createRadialGradient(
        canvas.width * 0.5, canvas.height * 0.42, 0,
        canvas.width * 0.5, canvas.height * 0.42, canvas.width * 0.55
      );
      g.addColorStop(0,   'rgba(74,144,217,0.2)');
      g.addColorStop(0.6, 'rgba(74,40,160,0.12)');
      g.addColorStop(1,   'rgba(20,0,48,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }, 3000);

})();
</script>

</body>
</html>
