<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tyler Walters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ground:      #140030;
      --text:        #F0F0F8;
      --accent:      #4A90D9;
      /* Title band height — enough for the larger italic title */
      --band-height: clamp(64px, 10vw, 120px);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--ground);
      font-family: 'Inter', sans-serif;
    }

    /* ============================================================
       TITLE BAND — solid ground color strip at top
    ============================================================ */
    #title-band {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--band-height);
      background: var(--ground);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Padding above text = good; no hard padding below (gradient handles it) */
      padding-top: 0.3em;
    }

    #title-band h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 100;
      font-style: italic;
      /* Roughly double the previous size relative to viewport width */
      font-size: clamp(2rem, 6.5vw, 7rem);
      letter-spacing: 0.28em;
      color: var(--text);
      line-height: 1;
      text-transform: none;
      user-select: none;
      white-space: nowrap;
    }

    /* Gradient fade at bottom of title band — softens the hard edge */
    #band-fade {
      position: fixed;
      top: var(--band-height);
      left: 0;
      right: 0;
      height: clamp(24px, 4vw, 52px);
      background: linear-gradient(
        to bottom,
        var(--ground) 0%,
        rgba(20, 0, 48, 0) 100%
      );
      z-index: 15;
      pointer-events: none;
    }

    /* ============================================================
       CANVAS
       Positioned below the title band.
       min-height enforces 16:9 relative to viewport width so
       the image never elongates when the window is squeezed.
       The body overflow:hidden clips anything below the viewport.
    ============================================================ */
    #seq-canvas {
      position: fixed;
      top: var(--band-height);
      left: 0;
      width: 100vw;
      /*
        Normal height fills remaining viewport.
        Minimum height = 16:9 of viewport width, so shrinking the
        window vertically never squashes the image — it just clips
        the bottom (body overflow:hidden handles that cleanly).
      */
      height: calc(100vh - var(--band-height));
      min-height: calc(100vw * 9 / 16);
      display: block;
    }

    /* ============================================================
       BOTTOM VIGNETTE — darkens bottom edge for legibility
    ============================================================ */
    #vignette {
      position: fixed;
      top: var(--band-height);
      left: 0;
      width: 100vw;
      height: calc(100vh - var(--band-height));
      pointer-events: none;
      z-index: 3;
      background: linear-gradient(
        to bottom,
        rgba(20, 0, 48, 0.0)  0%,
        rgba(20, 0, 48, 0.0)  65%,
        rgba(20, 0, 48, 0.70) 100%
      );
    }

    /* ============================================================
       BOTTOM-LEFT CLUSTER
       ENTER button with chevrons to its right
    ============================================================ */
    #bottom-left {
      position: fixed;
      bottom: 4vh;
      left: 4vw;
      z-index: 10;
      display: flex;
      flex-direction: row;      /* horizontal: button then arrows */
      align-items: center;
      gap: 1rem;
    }

    /* ENTER button */
    #enter-btn {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.72rem, 1.1vw, 1rem);   /* ~50% larger than before */
      font-weight: 300;
      letter-spacing: 0.52em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      background: transparent;
      border: 1px solid rgba(240, 240, 248, 0.38);
      padding: 0.75em 2.2em;
      opacity: 0.35;            /* more visible at start */
      transition: opacity 0.5s ease, border-color 0.4s ease, color 0.4s ease;
    }

    #enter-btn:hover {
      opacity: 1 !important;
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Chevrons — to the right of ENTER button */
    #scroll-arrows {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
      opacity: 0.35;            /* matches ENTER starting opacity */
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    #scroll-arrows svg {
      width: 16px;
      height: 11px;
      fill: none;
      stroke: var(--text);
      stroke-width: 1.5;
    }

    #scroll-arrows svg:nth-child(1) {
      animation: arrowBob 1.8s ease-in-out infinite;
    }
    #scroll-arrows svg:nth-child(2) {
      animation: arrowBob 1.8s ease-in-out infinite;
      animation-delay: 0.22s;
      opacity: 0.65;
    }

    @keyframes arrowBob {
      0%, 100% { transform: translateY(0);   }
      50%       { transform: translateY(4px); }
    }

    /* ============================================================
       PROGRESS LINE — thin accent line growing up left edge
    ============================================================ */
    #progress-line {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 2px;
      height: 0%;
      background: var(--accent);
      opacity: 0.4;
      z-index: 10;
    }

  </style>
</head>
<body>

  <canvas id="seq-canvas"></canvas>
  <div id="vignette"      aria-hidden="true"></div>
  <div id="progress-line" aria-hidden="true"></div>

  <!-- Title band with gradient fade below it -->
  <div id="title-band">
    <h1>Tyler Walters</h1>
  </div>
  <div id="band-fade" aria-hidden="true"></div>

  <!-- ENTER + chevrons in a row -->
  <div id="bottom-left">
    <a href="about.html" id="enter-btn" aria-label="Enter site">Enter</a>
    <div id="scroll-arrows" aria-hidden="true">
      <svg viewBox="0 0 20 11" xmlns="http://www.w3.org/2000/svg">
        <polyline points="2 2 10 9 18 2"/>
      </svg>
      <svg viewBox="0 0 20 11" xmlns="http://www.w3.org/2000/svg">
        <polyline points="2 2 10 9 18 2"/>
      </svg>
    </div>
  </div>


<script>
(function () {
  'use strict';

  /* ----------------------------------------------------------
     CONFIGURATION
  ---------------------------------------------------------- */
  const FRAME_COUNT  = 120;
  const FRAME_PATH   = 'assets/skyty-frames/frame';
  const FRAME_EXT    = '.jpg';
  const REVEAL_START = 0.45;
  const REVEAL_FULL  = 0.88;
  const SENSITIVITY  = 0.0007;

  /* ----------------------------------------------------------
     ELEMENTS
  ---------------------------------------------------------- */
  const canvas      = document.getElementById('seq-canvas');
  const ctx         = canvas.getContext('2d');
  const enterBtn    = document.getElementById('enter-btn');
  const arrows      = document.getElementById('scroll-arrows');
  const progressBar = document.getElementById('progress-line');

  /* ----------------------------------------------------------
     STATE
  ---------------------------------------------------------- */
  const frames     = new Array(FRAME_COUNT).fill(null);
  let currentFrame = 0;
  let targetFrame  = 0;
  let progress     = 0;
  let firstLoaded  = false;

  /* ----------------------------------------------------------
     CANVAS RESIZE
     Width  = full viewport width
     Height = max(viewport - band, 16:9 of viewport width)
     This prevents vertical squashing: when the window is too
     short, the canvas extends below the viewport (clipped by
     body overflow:hidden) rather than compressing the image.
  ---------------------------------------------------------- */
  function resizeCanvas () {
    const bandH    = canvas.offsetTop;   /* matches CSS --band-height */
    const viewH    = window.innerHeight;
    const viewW    = window.innerWidth;
    const minH     = viewW * 9 / 16;    /* 16:9 minimum */
    const targetH  = Math.max(viewH - bandH, minH);

    canvas.width  = viewW;
    canvas.height = targetH;
    drawFrame(currentFrame);
  }

  window.addEventListener('resize', resizeCanvas, { passive: true });
  requestAnimationFrame(resizeCanvas);

  /* ----------------------------------------------------------
     DRAW — cover scaling, image centred
  ---------------------------------------------------------- */
  function drawFrame (index) {
    const img = frames[index];
    if (!img || !img.naturalWidth) return;

    const cw = canvas.width;
    const ch = canvas.height;
    const iw = img.naturalWidth;
    const ih = img.naturalHeight;

    const scale = Math.max(cw / iw, ch / ih);
    const sw = iw * scale;
    const sh = ih * scale;
    const sx = (cw - sw) / 2;
    const sy = (ch - sh) / 2;

    ctx.clearRect(0, 0, cw, ch);
    ctx.drawImage(img, sx, sy, sw, sh);
  }

  /* ----------------------------------------------------------
     PRELOAD
  ---------------------------------------------------------- */
  for (let i = 0; i < FRAME_COUNT; i++) {
    const img = new Image();
    const idx = i;
    img.onload = function () {
      frames[idx] = img;
      if (!firstLoaded && idx === 0) {
        firstLoaded = true;
        resizeCanvas();
      }
    };
    img.onerror = function () {};
    img.src = FRAME_PATH + String(i + 1).padStart(3, '0') + FRAME_EXT;
  }

  /* ----------------------------------------------------------
     UI UPDATE
  ---------------------------------------------------------- */
  function updateUI () {
    progressBar.style.height = (progress * 100) + '%';

    if (progress >= REVEAL_START) {
      const t  = Math.min((progress - REVEAL_START) / (REVEAL_FULL - REVEAL_START), 1);
      const op = Math.max(0.35, t);
      enterBtn.style.opacity = String(op);
      arrows.style.opacity   = String(Math.min(0.35 + t * 0.5, 0.9));
    } else {
      enterBtn.style.opacity = '0.35';
      arrows.style.opacity   = '0.35';
    }
  }

  /* ----------------------------------------------------------
     ANIMATION LOOP
  ---------------------------------------------------------- */
  function animate () {
    if (targetFrame !== currentFrame) {
      currentFrame += targetFrame > currentFrame ? 1 : -1;
      drawFrame(currentFrame);
    }
    updateUI();
    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);

  /* ----------------------------------------------------------
     INPUT
  ---------------------------------------------------------- */
  function advanceByDelta (delta) {
    progress    = Math.min(Math.max(progress + delta * SENSITIVITY, 0), 1);
    targetFrame = Math.round(progress * (FRAME_COUNT - 1));
  }

  window.addEventListener('wheel', function (e) {
    e.preventDefault();
    advanceByDelta(e.deltaY);
  }, { passive: false });

  let touchStartY = null;
  window.addEventListener('touchstart', function (e) {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  window.addEventListener('touchmove', function (e) {
    if (touchStartY === null) return;
    const dy    = touchStartY - e.touches[0].clientY;
    touchStartY = e.touches[0].clientY;
    advanceByDelta(dy * 2.5);
  }, { passive: true });

  window.addEventListener('touchend', function () {
    touchStartY = null;
  }, { passive: true });

  window.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowDown' || e.key === 'PageDown') {
      e.preventDefault(); advanceByDelta(80);
    } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault(); advanceByDelta(-80);
    } else if ((e.key === 'Enter' || e.key === ' ') && progress >= REVEAL_START) {
      window.location.href = 'about.html';
    }
  });

  /* ----------------------------------------------------------
     PLACEHOLDER
  ---------------------------------------------------------- */
  setTimeout(function () {
    if (!firstLoaded) {
      const g = ctx.createRadialGradient(
        canvas.width * 0.5, canvas.height * 0.45, 0,
        canvas.width * 0.5, canvas.height * 0.45, canvas.width * 0.5
      );
      g.addColorStop(0,   'rgba(74,144,217,0.18)');
      g.addColorStop(0.6, 'rgba(74,40,160,0.10)');
      g.addColorStop(1,   'rgba(20,0,48,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }, 3000);

})();
</script>

</body>
</html>
