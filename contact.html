<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tyler Walters — Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page">

<div class="parallax-bg" aria-hidden="true">
  <img class="parallax-bg-img" id="bg-img"
       src="assets/skyty-frames/frame060.jpg" alt="">
</div>

<header class="site-header" id="site-header">
  <span class="site-header-name" aria-hidden="true">Tyler Walters</span>
  <nav class="nav-bar" aria-label="Site navigation">
    <a href="index.html"   class="nav-item nav-home">home</a>
    <a href="about.html"   class="nav-item">about</a>
    <a href="work.html"    class="nav-item">work</a>
    <a href="contact.html" class="nav-item active" aria-current="page">contact</a>
    <a href="cv.html"      class="nav-item">cv</a>
    <a href="press.html"   class="nav-item">press</a>
  </nav>
</header>

<div class="contact-page">
  <div class="contact-inner">
    <p class="section-title">Contact</p>
    <div class="accent-rule"></div>
    <p class="contact-text">
      For inquiries regarding performances, installations, collaborations,
      or any other matters, please use the form below.
    </p>
    <form class="contact-form" name="contact" method="POST" data-netlify="true">
      <div class="contact-field">
        <label class="contact-label" for="name">name</label>
        <input class="contact-input" type="text" id="name" name="name" autocomplete="name" required>
      </div>
      <div class="contact-field">
        <label class="contact-label" for="email">email</label>
        <input class="contact-input" type="email" id="email" name="email" autocomplete="email" required>
      </div>
      <div class="contact-field">
        <label class="contact-label" for="subject">subject</label>
        <input class="contact-input" type="text" id="subject" name="subject">
      </div>
      <div class="contact-field">
        <label class="contact-label" for="message">message</label>
        <textarea class="contact-textarea" id="message" name="message" required></textarea>
      </div>
      <button class="contact-submit" type="submit">send</button>
    </form>
  </div>
</div>

<script>
(function () {
  function setHeaderHeight () {
    const h = document.getElementById('site-header').offsetHeight;
    document.documentElement.style.setProperty('--header-h', h + 'px');
  }
  setHeaderHeight();
  window.addEventListener('resize', setHeaderHeight, { passive: true });

  const bgImg = document.getElementById('bg-img');
  window.addEventListener('scroll', function () {
    const progress = Math.min(window.scrollY / (document.body.scrollHeight - window.innerHeight), 1);
    bgImg.style.transform = 'scale(' + (1.05 + progress * 0.17) + ')';
  }, { passive: true });
})();
</script>

</body>
</html>
