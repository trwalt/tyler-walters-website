<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tyler Walters — Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page">

<div class="parallax-bg" aria-hidden="true">
  <img class="parallax-bg-img" src="assets/skyty-frames/frame040.jpg" alt="">
</div>

<nav class="nav-bar" aria-label="Site navigation">
  <a href="index.html"   class="nav-item nav-home">Home</a>
  <a href="about.html"   class="nav-item">About</a>
  <a href="work.html"    class="nav-item">Work</a>
  <a href="contact.html" class="nav-item active" aria-current="page">Contact</a>
  <a href="cv.html"      class="nav-item">CV</a>
  <a href="press.html"   class="nav-item">Press</a>
</nav>

<div class="contact-page">
  <div class="contact-inner">
    <p class="section-title">Contact</p>
    <div class="accent-rule"></div>
    <p class="contact-text">
      For inquiries regarding performances, installations, collaborations,
      or any other matters, please use the form below.
    </p>
    <form class="contact-form" action="#" method="post" novalidate>
      <div class="contact-field">
        <label class="contact-label" for="contact-name">Name</label>
        <input class="contact-input" type="text" id="contact-name" name="name" autocomplete="name" required>
      </div>
      <div class="contact-field">
        <label class="contact-label" for="contact-email">Email</label>
        <input class="contact-input" type="email" id="contact-email" name="email" autocomplete="email" required>
      </div>
      <div class="contact-field">
        <label class="contact-label" for="contact-subject">Subject</label>
        <input class="contact-input" type="text" id="contact-subject" name="subject">
      </div>
      <div class="contact-field">
        <label class="contact-label" for="contact-message">Message</label>
        <textarea class="contact-textarea" id="contact-message" name="message" required></textarea>
      </div>
      <button class="contact-submit" type="submit">Send</button>
    </form>
  </div>
</div>

<script>
(function () {
  const bgImg = document.querySelector('.parallax-bg-img');
  if (bgImg) {
    window.addEventListener('scroll', function () {
      const shift = window.scrollY * 0.012;
      bgImg.style.transform =
        'translate(-' + (10 - shift) + '%, -' + (10 - shift * 0.5) + '%) scale(1.05)';
    }, { passive: true });
  }
})();
</script>

</body>
</html>
