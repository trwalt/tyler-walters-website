<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tyler Walters — Press</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page">

<div class="parallax-bg" aria-hidden="true">
  <img class="parallax-bg-img" id="bg-img"
       src="assets/skyty-frames/frame100.jpg" alt="">
</div>

<header class="site-header" id="site-header">
  <span class="site-header-name" aria-hidden="true">Tyler Walters</span>
  <nav class="nav-bar" aria-label="Site navigation">
    <a href="index.html"   class="nav-item nav-home">home</a>
    <a href="about.html"   class="nav-item">about</a>
    <a href="work.html"    class="nav-item">work</a>
    <a href="contact.html" class="nav-item">contact</a>
    <a href="cv.html"      class="nav-item">cv</a>
    <a href="press.html"   class="nav-item active" aria-current="page">press</a>
  </nav>
</header>

<div class="press-page">
  <div class="press-inner">
    <p class="section-title">Press &amp; Documentation</p>
    <div class="accent-rule"></div>
    <p class="press-placeholder">
      Press and documentation for current work forthcoming.
    </p>
  </div>
</div>

<script>
(function () {
  function setHeaderHeight () {
    const h = document.getElementById('site-header').offsetHeight;
    document.documentElement.style.setProperty('--header-h', h + 'px');
  }
  setHeaderHeight();
  window.addEventListener('resize', setHeaderHeight, { passive: true });

  const bgImg = document.getElementById('bg-img');
  window.addEventListener('scroll', function () {
    const progress = Math.min(window.scrollY / (document.body.scrollHeight - window.innerHeight), 1);
    bgImg.style.transform = 'scale(' + (1.05 + progress * 0.17) + ')';
  }, { passive: true });
})();
</script>

</body>
</html>
