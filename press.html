<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page">

<div class="parallax-bg" aria-hidden="true">
  <img class="parallax-bg-img" src="assets/skyty-frames/frame040.jpg" alt="">
</div>

<nav class="nav-bar" aria-label="Site navigation">
  <a href="index.html"   class="nav-item nav-home">Home</a>

<div class="press-page">
  <div class="press-inner">
    <p class="section-title">Press &amp; Documentation</p>
    <div class="accent-rule"></div>
    <p class="press-placeholder">
      Press and documentation for current work forthcoming.
    </p>
  </div>
</div>

<script>
(function () {
  const bgImg = document.querySelector('.parallax-bg-img');
  if (bgImg) {
    window.addEventListener('scroll', function () {
      const shift = window.scrollY * 0.012;
      bgImg.style.transform =
        'translate(-' + (10 - shift) + '%, -' + (10 - shift * 0.5) + '%) scale(1.05)';
    }, { passive: true });
  }
})();
</script>

</body>
